<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline Lecturer Portal</title>
  <style>
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #142850; color: #f7fafc; }
    .app-shell { max-width: 940px; margin: 0 auto; padding: 26px; }
    h1 { margin-bottom: 12px; color: #90cdf4; }
    .card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; margin-bottom: 18px; }
    .nav { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 18px; }
    .nav button, .nav a { border: none; border-radius: 999px; background: #3182ce; color: white; padding: 12px 18px; cursor: pointer; text-decoration: none; }
    .nav button:hover, .nav a:hover { opacity: 0.94; }
    .list { display: grid; gap: 14px; }
    .list-item { background: rgba(255,255,255,0.06); padding: 14px; border-radius: 12px; }
    .status { margin-top: 12px; color: #d6e4ff; }
  </style>
</head>
<body>
  <div class="app-shell">
    <h1>Offline Lecturer Portal</h1>
    <div class="card">
      <p>Welcome, <strong id="username">Lecturer</strong>.</p>
      <p>This is the offline lecturer portal shell. Basic content is available when offline.</p>
    </div>
    <div class="nav">
      <button id="refreshBtn">Check Connection</button>
      <button id="logoutBtn">Logout</button>
      <a href="/offline-admin.html">Admin portal shell</a>
      <a href="/offline-student.html">Student portal shell</a>
      <a href="/login">Back to Login</a>
    </div>
    <div class="card">
      <h2>Lecture Tools (Offline)</h2>
      <div class="list" id="lectureTasks"></div>
      <p class="status" id="statusText">Cached offline lecturer portal. Live features require reconnecting.</p>
    </div>
  </div>
  <script>
    const offlineUser = JSON.parse(localStorage.getItem('offlineUser') || 'null');
    if (!offlineUser || offlineUser.role !== 'LECTURER') {
      window.location.href = '/login';
    }

    document.getElementById('username').textContent = offlineUser.username;

    const lectureTasks = [
      'Review cached assignments',
      'View student attendance snapshot',
      'Prepare offline lesson notes',
      'Update local lecture resources'
    ];
    const tasksEl = document.getElementById('lectureTasks');
    lectureTasks.forEach(task => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.textContent = task;
      tasksEl.appendChild(item);
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('offlineUser');
      window.location.href = '/login';
    });

    document.getElementById('refreshBtn').addEventListener('click', () => {
      if (navigator.onLine) {
        window.location.href = '/';
      } else {
        document.getElementById('statusText').textContent = 'Still offline. Offline lecturer shell is active.';
      }
    });
  </script>
</body>
</html>
