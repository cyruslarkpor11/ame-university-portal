# Railway Production Configuration
# This file is used when SPRING_PROFILES_ACTIVE=railway

# Server
server.port=${PORT:8080}

# Disable dev tools in production
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Enable caching
spring.thymeleaf.cache=true

# Railway PostgreSQL - Let Spring Boot auto-configure from DATABASE_URL
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Connection pool settings for Railway
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=20000

# Disable H2 console in production
spring.h2.console.enabled=false

# Logging
logging.level.org.springframework.boot=INFO
logging.level.com.example.universityeportal=INFO
logging.level.org.hibernate.SQL=ERROR

# Session timeout
server.servlet.session.timeout=12h
spring.session.timeout=43200
