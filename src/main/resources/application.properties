server.port=${PORT:8080}

# Session timeout - 24 hours (prevent auto-logout)
server.servlet.session.timeout=24h
spring.session.timeout=86400

spring.thymeleaf.cache=false
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-store=true
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Database configuration - Use Railway PostgreSQL if available, fallback to H2
# Railway provides DATABASE_URL environment variable
spring.datasource.url=${DATABASE_URL:jdbc:h2:mem:universitydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASS:}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# SQL logging for debugging
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.org.springframework.boot=INFO
logging.level.com.example.universityeportal=INFO