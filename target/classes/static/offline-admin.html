<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline Admin Portal</title>
  <style>
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0c1833; color: #eef2ff; }
    .app-shell { max-width: 980px; margin: 0 auto; padding: 28px; }
    h1 { margin-bottom: 12px; color: #7c9cff; }
    .card { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 22px; margin-bottom: 18px; }
    .nav { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 18px; }
    .nav button, .nav a { border: none; border-radius: 999px; background: #667eea; color: white; padding: 12px 18px; cursor: pointer; text-decoration: none; }
    .nav button:hover, .nav a:hover { opacity: 0.95; }
    .list { display: grid; gap: 14px; }
    .list-item { background: rgba(255,255,255,0.06); padding: 14px; border-radius: 12px; }
    .status { margin-top: 12px; color: #c8d5ff; }
  </style>
</head>
<body>
  <div class="app-shell">
    <h1>Offline Admin Portal</h1>
    <div class="card">
      <p>Welcome, <strong id="username">Admin</strong>.</p>
      <p>You are using the offline admin portal shell. Some features are available locally.</p>
    </div>
    <div class="nav">
      <button id="refreshBtn">Check Connection</button>
      <button id="logoutBtn">Logout</button>
      <a href="/offline-lecturer.html">Lecturer portal shell</a>
      <a href="/offline-student.html">Student portal shell</a>
      <a href="/login">Back to Login</a>
    </div>
    <div class="card">
      <h2>Admin Dashboard (Offline)</h2>
      <div class="list" id="adminTasks"></div>
      <p class="status" id="statusText">Cached offline admin portal. Live features require reconnecting.</p>
    </div>
  </div>
  <script>
    const offlineUser = JSON.parse(localStorage.getItem('offlineUser') || 'null');
    if (!offlineUser || offlineUser.role !== 'ADMIN') {
      window.location.href = '/login';
    }

    document.getElementById('username').textContent = offlineUser.username;

    const adminTasks = [
      'View cached user activity',
      'Edit offline settings',
      'Review cached reports',
      'Manage local admin notes'
    ];
    const tasksEl = document.getElementById('adminTasks');
    adminTasks.forEach(task => {
      const item = document.createElement('div');
      item.className = 'list-item';
      item.textContent = task;
      tasksEl.appendChild(item);
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
      localStorage.removeItem('offlineUser');
      window.location.href = '/login';
    });

    document.getElementById('refreshBtn').addEventListener('click', () => {
      if (navigator.onLine) {
        window.location.href = '/';
      } else {
        document.getElementById('statusText').textContent = 'Still offline. Offline admin shell is active.';
      }
    });
  </script>
</body>
</html>
