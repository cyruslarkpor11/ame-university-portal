server.port=8080

# Session timeout - 24 hours (prevent auto-logout)
server.servlet.session.timeout=24h
spring.session.timeout=86400

spring.thymeleaf.cache=false
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-store=true
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
# Database configuration
# Railway automatically provides DATABASE_URL
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./data/testdb}
spring.datasource.driverClassName=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update

# H2 console (for local development only)
spring.h2.console.enabled=false