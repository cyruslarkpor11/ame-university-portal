<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/Images/Zion.png">
    <title>Login - University E-Portal</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="/Images/Zion.png">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1f2a45;
            background-image: linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)), url('/Images/Image 1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
        }
        .login-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }
        .login-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .login-header p {
            opacity: 0.9;
            font-size: 14px;
        }
        .login-form {
            padding: 40px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.3s ease;
            margin-top: 10px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .error-message {
            background: #fee;
            color: #c00;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
            border: 1px solid #fcc;
        }
        .offline-banner {
            background: #f7f1c4;
            color: #4c3c05;
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #eadc65;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>🎓 African Methodist Episcopal Zion University</h1>
            <p>Nimba Extension Campus</p>
        </div>

        <div class="login-form">
            <div id="offline-banner" class="offline-banner" style="display:none;">
                You are currently offline.
            </div>
            <div id="offline-error" class="error-message" style="display:none;">
                Invalid username or password. Please try again.
            </div>
            <div id="online-error" th:if="${param.error}" class="error-message" style="display:none;">
                Invalid username or password. Please try again.
            </div>

            <form th:action="@{/login}" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required autofocus placeholder="Enter your username">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>

                <button id="loginBtn" type="submit" class="login-btn">Login</button>
            </form>
            
            <div style="margin-top: 20px; text-align: center;">
                <a href="/forgot-password" style="color: #667eea; text-decoration: none; font-size: 14px; margin: 0 10px;">Forgot Password?</a>
                <span style="color: #ccc;">|</span>
                <a href="/request-access.html" style="color: #4caf50; text-decoration: none; font-size: 14px; margin: 0 10px; font-weight: 600;">🔐 Request Access</a>
            </div>
        </div>
    </div>
    <script>
        const offlineBanner = document.getElementById('offline-banner');
        const offlineError = document.getElementById('offline-error');
        const onlineError = document.getElementById('online-error');
        const loginBtn = document.getElementById('loginBtn');
        const loginForm = document.querySelector('form');

        // Offline credentials (must match offline-login.html)
        const offlineUsers = {
            admin: { password: 'admin123', role: 'ADMIN' },
            lecturer: { password: 'lecturer123', role: 'LECTURER' },
            student: { password: 'student123', role: 'STUDENT' }
        };

        function updateOnlineStatus() {
            const isOnline = navigator.onLine;
            if (!isOnline) {
                offlineBanner.style.display = 'block';
                offlineError.style.display = 'none';
                if (onlineError) onlineError.style.display = 'none';
                loginBtn.disabled = false;
                loginBtn.style.opacity = '1';
                loginBtn.textContent = 'Login (offline)';
                loginBtn.title = 'Use offline credentials to log in while disconnected';
            } else {
                offlineBanner.style.display = 'none';
                offlineError.style.display = 'none';
                if (onlineError) onlineError.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.style.opacity = '1';
                loginBtn.textContent = 'Login';
                loginBtn.title = '';
            }
        }

        // Function to validate credentials including admin-created users
        function validateUserCredentials(username, password) {
            const usernameLower = username.toLowerCase();
            
            // Check hardcoded default users
            const defaultUser = offlineUsers[usernameLower];
            const customPass = localStorage.getItem('userPassword_' + usernameLower);
            
            if (defaultUser) {
                // User exists in defaults
                if (customPass) {
                    // Has custom password - validate against it
                    if (customPass === password) {
                        return { valid: true, role: defaultUser.role, user: defaultUser };
                    }
                } else {
                    // No custom password - check default
                    if (defaultUser.password === password) {
                        return { valid: true, role: defaultUser.role, user: defaultUser };
                    }
                }
                return { valid: false, error: 'Invalid password' };
            }
            
            // Check admin-created users from localStorage
            const adminUsers = JSON.parse(localStorage.getItem('adminUsers') || '[]');
            const adminCreatedUser = adminUsers.find(u => u.username.toLowerCase() === usernameLower);
            
            if (adminCreatedUser) {
                // User was created by admin
                if (customPass && customPass === password) {
                    // Password matches stored custom password
                    return { valid: true, role: adminCreatedUser.role, user: adminCreatedUser };
                }
                // No custom password set or doesn't match
                return { valid: false, error: 'Invalid password' };
            }
            
            // User not found
            return { valid: false, error: 'Invalid username' };
        }

        // Async function to validate credentials via API (for cross-device support)
        async function validateCredentialsViaAPI(username, password) {
            try {
                const response = await fetch('/api/users/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    return { valid: true, role: data.role, user: { username: data.username, role: data.role } };
                }
                
                return { valid: false, error: 'Invalid credentials' };
            } catch (error) {
                console.error('API validation failed:', error);
                return { valid: false, error: 'Network error' };
            }
        }

        // Handle offline login and default password check
        if (loginForm) {
            loginForm.addEventListener('submit', function(event) {
                const username = document.getElementById('username').value.trim().toLowerCase();
                const password = document.getElementById('password').value;
                const validation = validateUserCredentials(username, password);

                if (!navigator.onLine) {
                    // Offline mode - handle locally
                    event.preventDefault();
                    
                    if (!validation.valid) {
                        offlineError.style.display = 'block';
                        offlineBanner.style.display = 'block';
                        if (onlineError) onlineError.style.display = 'none';
                        return;
                    }
                    
                    const userRole = validation.role;
                    
                    // Login successful - no password change required
                    localStorage.setItem('offlineUser', JSON.stringify({ username: username, role: userRole }));
                    const targetPage = userRole === 'ADMIN'
                      ? '/offline-admin.html'
                      : userRole === 'LECTURER'
                      ? '/offline-lecturer.html'
                      : '/offline-student.html';
                    window.location.href = targetPage;
                } else {
                    // Online mode - let Spring Security handle login
                    // No first-time password change required
                }
            });
        }

        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);
        updateOnlineStatus();

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(function(registration) {
                        console.log('ServiceWorker registered:', registration.scope);
                    })
                    .catch(function(error) {
                        console.warn('ServiceWorker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
