server.port=8080

# Session timeout - 24 hours (prevent auto-logout)
server.servlet.session.timeout=24h
spring.session.timeout=86400

spring.thymeleaf.cache=false
spring.web.resources.cache.period=0
spring.web.resources.cache.cachecontrol.no-store=true
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
# Database configuration - H2 in-memory (reliable for Railway)
spring.datasource.url=jdbc:h2:mem:universitydb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.org.springframework.boot=INFO
logging.level.com.example.universityeportal=INFO
logging.level.org.hibernate.SQL=DEBUG